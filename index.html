<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Miles Fraser Invitational</title>
<script>
  const FIREBASE_CONFIG = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };
  const EVENT_DATE  = "30 May 2026";
  const EVENT_VENUE = "Toot Hill Golf Club · Ongar, Essex";

  // 🔧 LOGO: Replace with your WordPress media library URL
  // e.g. "https://yoursite.com/wp-content/uploads/2026/05/mfi-logo.png"
  // Leave as "" to show the text title instead
  const LOGO_URL = "https://milesthomas117-evnaz.wordpress.com/wp-content/uploads/2026/05/add-a-little-bit-of-body-text-933-x-393-px.png";
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#f5f0e8;font-family:'EB Garamond',Georgia,serif;font-size:16px}

.wrap{max-width:640px;margin:0 auto;padding:0 0 5rem}

/* ── Header ── */
.hdr{text-align:center;padding:0.6rem 1rem;border-bottom:2px solid #1a4a1a;background:#fffdf7}
.hdr-logo{max-width:200px;height:auto;display:block;margin:0 auto 0.4rem}
.hdr-date{font-size:11px;letter-spacing:0.18em;color:#1a4a1a;text-transform:uppercase}
.hdr-venue{font-size:11px;letter-spacing:0.1em;color:#5a7a5a;text-transform:uppercase;margin-top:2px}

/* ── Login screen ── */
.login-screen{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
.login-card{background:#fffdf7;border:1px solid #c8b88a;border-radius:6px;padding:2rem 1.75rem;width:100%;max-width:360px}
.login-title{font-family:'Playfair Display',serif;font-size:20px;color:#1a4a1a;margin-bottom:0.25rem}
.login-sub{font-family:'EB Garamond',serif;font-size:14px;color:#5a7a5a;margin-bottom:1.5rem;font-style:italic}
.login-label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#5a7a5a;font-family:'EB Garamond',serif;display:block;margin-bottom:5px}
.login-input{width:100%;padding:12px 14px;border:1px solid #c8b88a;border-radius:4px;background:#fff;font-family:'EB Garamond',serif;font-size:16px;color:#1a4a1a;margin-bottom:1rem;-webkit-appearance:none}
.login-input:focus{outline:none;border-color:#1a4a1a}
.login-btn{width:100%;padding:13px;background:#1a4a1a;color:#f5f0e8;border:none;border-radius:4px;font-family:'EB Garamond',serif;font-size:17px;letter-spacing:0.06em;cursor:pointer;-webkit-appearance:none;margin-top:0.25rem}
.login-btn:active{background:#0d2d0d}
.login-error{font-family:'EB Garamond',serif;font-size:14px;color:#791F1F;font-style:italic;text-align:center;margin-top:0.75rem;min-height:20px}
.login-offline{font-family:'EB Garamond',serif;font-size:12px;color:#8a9a8a;text-align:center;margin-top:1rem;font-style:italic}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid #c8b88a;background:#f5f0e8;position:sticky;top:0;z-index:50}
.tab{flex:1;padding:13px 8px;font-family:'EB Garamond',serif;font-size:15px;letter-spacing:0.05em;border:none;cursor:pointer;background:transparent;color:#5a7a5a;border-bottom:3px solid transparent;transition:all 0.15s}
.tab.active{color:#1a4a1a;border-bottom-color:#1a4a1a;font-weight:500}

/* ── User bar ── */
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0.875rem;background:#ece7d8;border-bottom:1px solid #d5c8a8}
.user-bar-name{font-family:'Playfair Display',serif;font-size:14px;color:#1a4a1a;display:flex;align-items:center;gap:7px}
.user-dot{width:8px;height:8px;border-radius:50%}
.user-bar-status{font-family:'EB Garamond',serif;font-size:12px;color:#5a7a5a;display:flex;align-items:center;gap:10px}
.logout-btn{font-family:'EB Garamond',serif;font-size:12px;color:#791F1F;background:none;border:none;cursor:pointer;padding:0;letter-spacing:0.04em;text-decoration:underline}
.sync-badge{font-size:11px;color:#085041;background:#d8f0e8;padding:2px 7px;border-radius:3px}
.offline-badge{font-size:11px;color:#633806;background:#f5e8d0;padding:2px 7px;border-radius:3px}

.section{display:none;padding:1rem 0.875rem}
.section.active{display:block}

/* ── Score card ── */
.card{background:#fffdf7;border:1px solid #c8b88a;border-radius:4px;padding:1rem;margin-bottom:0.875rem}
.card-title{font-family:'Playfair Display',serif;font-size:17px;color:#1a4a1a;margin-bottom:0.875rem;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.hole-list{display:flex;flex-direction:column}
.hole-row{display:grid;grid-template-columns:1.8rem 2.6rem 3rem 1fr auto;align-items:center;gap:8px;padding:9px 2px;border-bottom:0.5px solid #e8dfc8}
.hole-row:last-child{border-bottom:none}
.hole-num{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1a4a1a;text-align:center}
.hole-par{font-size:12px;color:#8a9a8a;text-align:center;line-height:1.3}
.hole-yards{font-size:11px;color:#b8a060;text-align:center;line-height:1.3;font-family:'EB Garamond',serif;letter-spacing:0.01em}
.score-btn{width:56px;height:44px;border:1px solid #c8b88a;border-radius:4px;background:#fff;font-family:'Playfair Display',serif;font-size:20px;color:#1a4a1a;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.score-btn.no-score{font-size:13px;font-family:'EB Garamond',serif;color:#aaa;letter-spacing:0.04em}
.diff-pill{font-size:12px;padding:4px 8px;border-radius:3px;white-space:nowrap;min-width:56px;text-align:center;font-family:'EB Garamond',serif}
.diff-eagle{color:#085041;background:#d8f0e8}
.diff-birdie{color:#0C447C;background:#daeaf8}
.diff-par{color:#5a7a5a;background:#ece7d8}
.diff-bogey{color:#633806;background:#f5e8d0}
.diff-double{color:#791F1F;background:#fae0e0}
.diff-empty{color:#ccc}
.nine-lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#5a7a5a;padding:8px 2px 4px;font-family:'EB Garamond',serif}
.submit-area{display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:1px solid #c8b88a;gap:12px}
.total-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#5a7a5a}
.total-num{font-family:'Playfair Display',serif;font-size:30px;color:#1a4a1a;line-height:1}
.total-vp{font-size:14px;margin-top:3px}
.submit-btn{padding:13px 22px;border-radius:4px;background:#1a4a1a;color:#f5f0e8;border:none;font-family:'EB Garamond',serif;font-size:16px;letter-spacing:0.05em;cursor:pointer;-webkit-appearance:none}
.submitted-badge{font-family:'EB Garamond',serif;font-size:15px;color:#085041;font-style:italic}
.saving-ind{font-size:12px;color:#8a9a8a;font-family:'EB Garamond',serif;font-style:italic;min-height:16px;margin-top:4px}
.reset-btn{padding:9px 14px;border-radius:4px;background:transparent;color:#791F1F;border:1px solid #791F1F;font-family:'EB Garamond',serif;font-size:13px;letter-spacing:0.04em;cursor:pointer;-webkit-appearance:none;opacity:0.75}
.reset-btn:active{background:#fae0e0}
.hcap-badge{font-size:11px;background:#f5e8d0;color:#633806;padding:2px 8px;border-radius:3px;font-family:'EB Garamond',serif}
.lock-notice{background:#f5e8d0;border:1px solid #d5c8a8;border-radius:3px;padding:10px 12px;margin-bottom:0.875rem;font-family:'EB Garamond',serif;font-size:14px;color:#633806;font-style:italic}

/* ── Leaderboard ── */
.lb-hdr{display:grid;grid-template-columns:28px 1fr 48px 64px;gap:6px;padding:6px 10px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#5a7a5a;font-family:'EB Garamond',serif}
.lb-row{display:grid;grid-template-columns:28px 1fr 48px 64px;gap:6px;align-items:center;padding:13px 10px;border-radius:3px;margin-bottom:2px}
.lb-row.leader{border-left:3px solid #c8a820;padding-left:7px}
.lb-pos{font-size:15px;color:#5a7a5a;text-align:center}
.lb-name{font-family:'Playfair Display',serif;font-size:14px;color:#1a4a1a;display:flex;align-items:center;gap:7px}
.lb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lb-holes{font-size:13px;color:#8a9a8a;text-align:right;font-family:'EB Garamond',serif}
.lb-score{font-size:18px;text-align:right;font-family:'Playfair Display',serif}
.lb-div{border:none;border-top:1px solid #c8b88a;margin:5px 0}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:#ece7d8;border-radius:3px;padding:11px 8px;border:1px solid #d5c8a8}
.stat-lbl{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#5a7a5a;margin-bottom:4px;font-family:'EB Garamond',serif}
.stat-val{font-family:'Playfair Display',serif;font-size:18px;color:#1a4a1a;line-height:1.1}
.stat-sub{font-size:11px;color:#8a9a8a;font-family:'EB Garamond',serif;margin-top:2px}
.hole-grid{display:flex;gap:5px;flex-wrap:wrap}
.hp-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'EB Garamond',serif;border:1px solid #c8b88a;color:#8a9a8a}
.sec-lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#5a7a5a;margin-bottom:8px;font-family:'EB Garamond',serif}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#085041;font-family:'EB Garamond',serif;background:#d8f0e8;padding:3px 9px;border-radius:3px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#085041;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Drives tab ── */
.drives-team-block{background:#fffdf7;border:1px solid #c8b88a;border-radius:4px;padding:1rem;margin-bottom:0.875rem}
.drives-team-title{font-family:'Playfair Display',serif;font-size:16px;color:#1a4a1a;margin-bottom:0.75rem;display:flex;align-items:center;gap:8px}
.drives-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.drives-player{background:#f5f0e8;border-radius:3px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border:1px solid #e0d8c0}
.drives-player-name{font-family:'EB Garamond',serif;font-size:14px;color:#1a4a1a}
.drives-player-name.me{font-weight:600;color:#1a4a1a}
.drives-count{font-family:'Playfair Display',serif;font-size:22px;color:#1a4a1a;min-width:28px;text-align:right}
.drives-bar{height:4px;background:#e0d8c0;border-radius:2px;margin-top:6px;overflow:hidden}
.drives-bar-fill{height:100%;background:#1a4a1a;border-radius:2px;transition:width 0.3s}
.drives-total{font-family:'EB Garamond',serif;font-size:12px;color:#8a9a8a;margin-top:6px;font-style:italic}

/* ── Tee shot button in hole row ── */
.tee-btn{height:44px;padding:0 10px;border:1px solid #c8b88a;border-radius:4px;background:#fff;font-family:'EB Garamond',serif;font-size:13px;color:#5a7a5a;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;-webkit-appearance:none;min-width:80px;justify-content:center}
.tee-btn.has-driver{border-color:#1a4a1a;color:#1a4a1a;background:#f0f7ec}
.tee-btn-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;display:block;color:#8a9a8a;margin-bottom:1px}

/* ── Picker ── */
.picker-overlay{position:fixed;inset:0;background:rgba(15,25,15,0.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s}
.picker-overlay.open{opacity:1;pointer-events:all}
.picker-sheet{background:#fffdf7;border-radius:14px 14px 0 0;width:100%;max-width:500px;padding-bottom:max(env(safe-area-inset-bottom),16px)}
.picker-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #e8dfc8}
.picker-hole-info{font-family:'Playfair Display',serif;font-size:17px;color:#1a4a1a}
.picker-hole-sub{font-size:13px;color:#5a7a5a;font-family:'EB Garamond',serif;margin-top:2px}
.picker-done{background:#1a4a1a;color:#f5f0e8;border:none;border-radius:4px;padding:9px 22px;font-family:'EB Garamond',serif;font-size:16px;cursor:pointer;-webkit-appearance:none}
.picker-drum{position:relative;height:210px;overflow:hidden;margin:0 20px}
.picker-drum-inner{overflow-y:scroll;height:210px;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.picker-drum-inner::-webkit-scrollbar{display:none}
.picker-item{height:54px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-family:'Playfair Display',serif;font-size:22px;color:#ccc;cursor:pointer;user-select:none}
.picker-item.active{color:#1a4a1a;font-size:38px;font-weight:700}
.picker-highlight{display:none}
.picker-footer{text-align:center;padding:8px 0 4px;font-family:'EB Garamond',serif;font-size:15px;min-height:30px;color:#3a5a3a}

.error-banner{background:#fae0e0;border:1px solid #e0b0b0;border-radius:3px;padding:12px 14px;margin:0.875rem 0.875rem 0;font-family:'EB Garamond',serif;font-size:14px;color:#791F1F;display:none}
.error-banner.show{display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4a1a;color:#f5f0e8;padding:11px 20px;border-radius:4px;font-family:'EB Garamond',serif;font-size:15px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr" id="hdr">
    <div id="hdr-content"></div>
    <div class="hdr-date" id="mfi-date"></div>
    <div class="hdr-venue" id="mfi-venue"></div>
  </div>

  <div class="error-banner" id="errorBanner">Unable to connect to Firebase. Scores are being saved locally and will sync when connection is restored.</div>

  <!-- Login screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-title">Welcome</div>
      <div class="login-sub">Sign in to begin scoring</div>
      <label class="login-label" for="unInput">Username</label>
      <input class="login-input" id="unInput" type="text" autocomplete="username" autocapitalize="none" placeholder="Enter your name">
      <label class="login-label" for="pwInput">Password</label>
      <input class="login-input" id="pwInput" type="password" autocomplete="current-password" placeholder="Enter your password">
      <button class="login-btn" onclick="doLogin()">Sign in</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-offline" id="loginOffline"></div>
    </div>
  </div>

  <!-- App (shown after login) -->
  <div id="appScreen" style="display:none">
    <div class="user-bar">
      <div class="user-bar-name">
        <div class="user-dot" id="userDot"></div>
        <span id="userBarName"></span>
      </div>
      <div class="user-bar-status">
        <span id="syncBadge"></span>
        <span id="adminResetBtn"></span>
        <button class="logout-btn" onclick="doLogout()">Sign out</button>
      </div>
    </div>

    <div class="tabs" id="tabsContainer">
      <button class="tab active" id="tab-entry" onclick="switchTab('entry')">Score Entry</button>
      <button class="tab" id="tab-dashboard" onclick="switchTab('dashboard')">Live Leaderboard</button>
    </div>

    <div id="entry" class="section active">
      <div id="scoreCard"></div>
    </div>

    <div id="dashboard" class="section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
        <div class="live-badge"><span class="live-dot"></span>Live scoring</div>
        <div style="font-family:'EB Garamond',serif;font-size:12px;color:#8a9a8a" id="lastUpdate"></div>
      </div>
      <div class="stat-grid" id="statCards"></div>
      <div class="sec-lbl">Official standings</div>
      <div class="card" style="padding:0.75rem 0.5rem">
        <div class="lb-hdr"><span></span><span>Team</span><span style="text-align:right">Thru</span><span style="text-align:right">Score</span></div>
        <div id="leaderboard"></div>
      </div>
      <div class="sec-lbl" style="margin-top:1rem">Hole-by-hole</div>
      <div class="card"><div id="holeProgress" class="hole-grid"></div></div>
    </div>

  <div id="drives-tab" class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="live-badge"><span class="live-dot"></span>Live drives</div>
      <div style="font-family:'EB Garamond',serif;font-size:12px;color:#8a9a8a" id="drivesLastUpdate"></div>
    </div>
    <div id="drivesContent"></div>
  </div>

</div>

<!-- Drive player picker -->
<div class="picker-overlay" id="drivePickerOverlay" onclick="driveOverlayClick(event)">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div>
        <div class="picker-hole-info" id="drivePickerTitle">Who drove?</div>
        <div class="picker-hole-sub" id="drivePickerSub"></div>
      </div>
      <button class="picker-done" onclick="closeDrivePicker(true)">Select</button>
    </div>
    <div class="picker-drum">
      <div class="picker-highlight" style="display:none"></div>
      <div class="picker-drum-inner" id="driveDrumInner"></div>
    </div>
    <div class="picker-footer" id="drivePickerFooter"></div>
  </div>
</div>

<!-- Score Picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="overlayClick(event)">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div>
        <div class="picker-hole-info" id="pickerTitle">Hole 1</div>
        <div class="picker-hole-sub" id="pickerSub">Par 4</div>
      </div>
      <button class="picker-done" onclick="closePicker()">Done</button>
    </div>
    <div class="picker-drum">
      <div class="picker-highlight"></div>
      <div class="picker-drum-inner" id="drumInner"></div>
    </div>
    <div class="picker-footer" id="pickerFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const TEAMS = [
  {id:0, name:"John's Team",    username:"john",    password:"John",    color:"#712B13", light:"#FAECE7", handicap:3},
  {id:1, name:"Miles' Team",   username:"miles",   password:"Miles",   color:"#1a4a1a", light:"#EAF3DE", handicap:0},
  {id:2, name:"Charlie's Team",username:"charlie", password:"Charlie", color:"#0C447C", light:"#E6F1FB", handicap:0},
  {id:3, name:"Turns' Team",   username:"turns",   password:"Turns",   color:"#533AB7", light:"#EEEDFE", handicap:0},
  {id:4, name:"Theo's Team",   username:"theo",    password:"Theo",    color:"#633806", light:"#FAEEDA", handicap:0}
];
const PARS  = [4,4,3,4,4,3,5,4,4,4,5,3,4,4,3,5,3,4];
const YARDS = [422,362,143,393,342,162,436,255,354,398,512,125,379,411,118,470,127,276];
const TEAM_PLAYERS = [
  ["Alex","Clayds","John","Sarge"],          // John's Team  (alphabetical)
  ["Aaron","Blight","Miggy","Miles"],  // Miles' Team
  ["Baylis","Charlie","Frazer","Vinnie"],    // Charlie's Team
  ["George","Lawrence","Sewell","Turns"],    // Turns' Team
  ["Ayden","David","Theo","Tom"]             // Theo's Team
];
const HOLES = 18, LEADERBOARD_LOCK_HOLE = 15, COLLECTION = "mfi2026";
const SMIN = 1, SMAX = 12, ITEM_H = 54, PAD = 2;
const CACHE_KEY = ti => "mfi2026_team_" + ti;
const SESSION_KEY = "mfi2026_session";

// ─── State ────────────────────────────────────────────────────────────────────
let db = null, isOnline = true, liveUnsub = null;
let currentTeam = null; // logged-in team index
let state = {
  scores:    TEAMS.map(() => Array(HOLES).fill(null)),
  submitted: TEAMS.map(() => false),
  teeShots:  TEAMS.map(() => Array(HOLES).fill(null))
};
// drives tally is always computed from teeShots — single source of truth
function computeDrives(ti) {
  const d = {};
  TEAM_PLAYERS[ti].forEach(p => d[p] = 0);
  state.teeShots[ti].forEach(player => {
    if(player && d.hasOwnProperty(player)) d[player]++;
  });
  return d;
}
function getDrives(ti){ return computeDrives(ti); }
let pTeam = null, pHole = null, pScrollTimer = null;
// Drive picker state
let dPickerTeam = null, dPickerHole = null, dPickerScrollTimer = null, dPickerResolve = null;
// (drives tally is always computed live from state.teeShots — no separate store)

// ─── Local cache helpers ──────────────────────────────────────────────────────
function saveToCache(ti) {
  try {
    localStorage.setItem(CACHE_KEY(ti), JSON.stringify({
      scores:    state.scores[ti],
      submitted: state.submitted[ti],
      teeShots:  state.teeShots[ti],
      savedAt:   Date.now()
    }));
  } catch(e) {}
}

function loadFromCache(ti) {
  try {
    const raw = localStorage.getItem(CACHE_KEY(ti));
    if (!raw) return false;
    const d = JSON.parse(raw);
    state.scores[ti]    = d.scores    || Array(HOLES).fill(null);
    state.submitted[ti] = d.submitted === true;
    state.teeShots[ti]  = d.teeShots  || Array(HOLES).fill(null);
    return true;
  } catch(e) { return false; }
}

function clearCache(ti) {
  try { localStorage.removeItem(CACHE_KEY(ti)); } catch(e) {}
}

// Restore session (stay logged in across refreshes)
function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const { ti } = JSON.parse(raw);
    if (ti !== undefined && ti >= 0 && ti < TEAMS.length) {
      currentTeam = ti;
      return true;
    }
  } catch(e) {}
  return false;
}

function saveSession(ti) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ti})); } catch(e) {}
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

// Flush any cached scores back to Firebase when we come back online
async function tryFlushCache() {
  if (!db || !isOnline) return;
  for (let ti = 0; ti < TEAMS.length; ti++) {
    const raw = localStorage.getItem(CACHE_KEY(ti));
    if (!raw) continue;
    try {
      const d = JSON.parse(raw);
      // First check Firebase to make sure we're not overwriting a reset
      const doc = await db.collection(COLLECTION).doc("team_"+ti).get();
      if (doc.exists) {
        const server = doc.data();
        // If server has a newer resetAt than our cache savedAt, don't flush — server wins
        const serverReset = server.resetAt ? server.resetAt.toMillis() : 0;
        const cacheSaved  = d.savedAt || 0;
        if (serverReset > cacheSaved) { clearCache(ti); continue; }
      }
      await db.collection(COLLECTION).doc("team_"+ti).set({
        teamId: ti, teamName: TEAMS[ti].name,
        scores: d.scores, submitted: d.submitted === true,
        teeShots: d.teeShots || Array(HOLES).fill(null),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      clearCache(ti);
    } catch(e) {}
  }
}

// ─── Login ────────────────────────────────────────────────────────────────────
function doLogin() {
  const un = document.getElementById("unInput").value.trim().toLowerCase();
  const pw = document.getElementById("pwInput").value.trim();
  const team = TEAMS.find(t => t.username === un && t.password === pw);
  if (!team) {
    document.getElementById("loginError").textContent = "Incorrect username or password.";
    document.getElementById("pwInput").value = "";
    return;
  }
  currentTeam = team.id;
  saveSession(currentTeam);
  launchApp();
}

// Allow pressing Enter on password field
document.getElementById("pwInput").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("unInput").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("pwInput").focus(); });

function doLogout() {
  if (liveUnsub) { liveUnsub(); liveUnsub = null; }
  clearSession();
  currentTeam = null;
  document.getElementById("appScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("unInput").value = "";
  document.getElementById("pwInput").value = "";
  document.getElementById("loginError").textContent = "";
}

async function launchApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "block";

  const t = TEAMS[currentTeam];
  document.getElementById("userBarName").textContent = t.name;
  document.getElementById("userDot").style.background = t.color;
  updateSyncBadge();

  // Show admin reset button only for Miles (team id 1)
  const adminBtn = document.getElementById("adminResetBtn");
  if (currentTeam === 1) {
    adminBtn.innerHTML = `<button class="logout-btn" style="color:#791F1F;margin-right:6px" onclick="adminResetAll()">⚠ Reset all</button>`;
  } else {
    adminBtn.innerHTML = "";
  }

  // Step 1: Load from cache instantly and render — user sees scorecard immediately
  for (let ti = 0; ti < TEAMS.length; ti++) { loadFromCache(ti); }
  renderTabs();
  renderScoreCard();
  renderDashboard();
  renderDrives();

  // Step 2: Sync Firebase in the background
  loadAllScores().then(() => {
    renderTabs();
    renderScoreCard();
    renderDashboard();
    renderDrives();
  });
  startLiveListener();
}

function updateSyncBadge() {
  const el = document.getElementById("syncBadge");
  if (!el) return;
  el.className = isOnline ? "sync-badge" : "offline-badge";
  el.textContent = isOnline ? "● Online" : "○ Offline — saving locally";
}

// ─── Firebase ─────────────────────────────────────────────────────────────────
async function loadAllScores() {
  if (!db) return;
  try {
    const snap = await db.collection(COLLECTION).get();
    snap.forEach(doc => {
      const d = doc.data(), ti = parseInt(doc.id.replace("team_",""));
      if (isNaN(ti)||ti<0||ti>=TEAMS.length) return;
      state.scores[ti]    = d.scores    || Array(HOLES).fill(null);
      state.submitted[ti] = d.submitted === true; // explicit — false stays false after reset
      state.teeShots[ti]  = d.teeShots  || Array(HOLES).fill(null);
      saveToCache(ti);
    });
  } catch(e) {
    document.getElementById("errorBanner").classList.add("show");
  }
}

async function saveTeamScores(ti) {
  // Always save to cache immediately
  saveToCache(ti);
  setSaving(true);
  if (!db || !isOnline) { setSaving(false, true); return; }
  try {
    await db.collection(COLLECTION).doc("team_"+ti).set({
      teamId: ti, teamName: TEAMS[ti].name,
      scores: state.scores[ti], submitted: state.submitted[ti],
      teeShots: state.teeShots[ti],
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    clearCache(ti);
  } catch(e) {
    showToast("Saved locally — will sync when online");
  }
  setSaving(false);
}

function setSaving(v, offline=false) {
  const el = document.getElementById("savingIndicator");
  if (!el) return;
  if (v) { el.textContent = "Saving…"; return; }
  el.textContent = offline ? "Saved locally" : "Saved";
  setTimeout(() => { if(el) el.textContent = ""; }, 1800);
}

function startLiveListener() {
  if (!db) return;
  if (liveUnsub) liveUnsub();
  liveUnsub = db.collection(COLLECTION).onSnapshot(snap => {
    snap.docChanges().forEach(ch => {
      const d = ch.doc.data(), ti = parseInt(ch.doc.id.replace("team_",""));
      if (isNaN(ti)||ti<0||ti>=TEAMS.length) return;
      state.scores[ti]    = d.scores    || Array(HOLES).fill(null);
      state.submitted[ti] = d.submitted === true; // explicit — false stays false after reset
      state.teeShots[ti]  = d.teeShots  || Array(HOLES).fill(null);
      saveToCache(ti);
    });
    renderTabs();
    if (currentTeam !== null) renderScoreCard();
    if (document.getElementById("dashboard").classList.contains("active")) renderDashboard();
    if (document.getElementById("drives-tab").classList.contains("active")) renderDrives();
    const el = document.getElementById("lastUpdate");
    if (el) el.textContent = "Updated " + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, () => {
    isOnline = false; updateSyncBadge();
  });
}

// ─── Picker ───────────────────────────────────────────────────────────────────
function openPicker(ti, hi) {
  pTeam=ti; pHole=hi;
  const par=PARS[hi];
  // If no score entered yet, default to par. If already scored, show that score.
  const cur = state.scores[ti][hi] !== null ? state.scores[ti][hi] : par;
  document.getElementById("pickerTitle").textContent = "Hole "+(hi+1);
  document.getElementById("pickerSub").textContent   = "Par "+par;
  buildDrum(par, cur);
  document.getElementById("pickerOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function buildDrum(par, selected) {
  const drum = document.getElementById("drumInner");
  drum.innerHTML = "";
  for (let k=0;k<PAD;k++) drum.appendChild(makePad());
  for (let v=SMIN;v<=SMAX;v++) {
    const el=document.createElement("div");
    el.className="picker-item"; el.textContent=v; el.dataset.v=v;
    drum.appendChild(el);
  }
  for (let k=0;k<PAD;k++) drum.appendChild(makePad());
  // Each item is ITEM_H px tall. The highlight window is centred in the drum.
  // scrollTop = N * ITEM_H places item N at the top of the drum.
  // The highlight sits at drum centre = PAD * ITEM_H from the top of the scroll content.
  // So to centre item at index (selected-SMIN), set scrollTop = (selected-SMIN)*ITEM_H.
  // We then read back the centred index with getSelectedIdx which uses the same formula.
  drum.scrollTop = (selected - SMIN) * ITEM_H;
  drum.getBoundingClientRect(); // flush layout
  refreshDrum(drum, par);
  drum.addEventListener("scroll", () => {
    refreshDrum(drum, par);
    clearTimeout(pScrollTimer);
    pScrollTimer = setTimeout(() => snapDrum(drum, par), 100);
  }, {passive:true});
}

function makePad() {
  const e=document.createElement("div"); e.className="picker-item"; e.style.visibility="hidden"; return e;
}
function snapDrum(drum, par) {
  const idx = Math.round(drum.scrollTop / ITEM_H);
  const clamped = Math.max(0, Math.min(SMAX - SMIN, idx));
  drum.scrollTo({top: clamped * ITEM_H, behavior:"smooth"});
  refreshDrum(drum, par);
}
function getSelectedIdx(drum) {
  return Math.round(drum.scrollTop / ITEM_H);
}
function refreshDrum(drum, par) {
  const idx = getSelectedIdx(drum);
  drum.querySelectorAll(".picker-item[data-v]").forEach((el,i) => el.classList.toggle("active", i === idx));
  const val = SMIN + idx;
  if (val >= SMIN && val <= SMAX) {
    const d = val - par;
    const label = d<=-2?"Eagle":d===-1?"Birdie":d===0?"Par":d===1?"Bogey":d===2?"Double bogey":"+"+d+" over par";
    document.getElementById("pickerFooter").textContent = val + " — " + label;
  }
}
function overlayClick(e) { if(e.target===document.getElementById("pickerOverlay")) closePicker(); }
function closePicker() {
  if (pTeam!==null && pHole!==null) {
    const drum = document.getElementById("drumInner");
    const idx = getSelectedIdx(drum);
    const val = Math.max(SMIN, Math.min(SMAX, SMIN + idx));
    commitScore(pTeam, pHole, val);
  }
  document.getElementById("pickerOverlay").classList.remove("open");
  document.body.style.overflow = "";
  pTeam=null; pHole=null;
}
function commitScore(ti,hi,val) {
  state.scores[ti][hi]=val;
  renderTabs(); renderScoreCard();
  clearTimeout(window._st);
  window._st=setTimeout(()=>saveTeamScores(ti),800);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function vpStr(vp){return vp===0?"E":(vp>0?"+":"")+vp;}
function toVsPar(s,p){
  const d=s-p;
  if(d<=-2)return{label:"Eagle",cls:"diff-eagle"};
  if(d===-1)return{label:"Birdie",cls:"diff-birdie"};
  if(d===0)return{label:"Par",cls:"diff-par"};
  if(d===1)return{label:"Bogey",cls:"diff-bogey"};
  return{label:"+"+d,cls:"diff-double"};
}
function leaderboardLocked(){
  // Hides leaderboard tab once ANY team hits hole 15
  return state.scores.some(sc => sc.filter(s=>s!==null).length >= LEADERBOARD_LOCK_HOLE);
}
function allCardsSubmitted(){
  return state.submitted.every(s => s === true);
}
function canSeeLeaderboard(){
  // Miles (id 1): sees it when all 5 cards submitted, OR before hole 15 lock
  // Everyone else: never sees it once locked, and never sees final results
  if (currentTeam === 1) {
    // If all submitted — show full results regardless of lock
    if (allCardsSubmitted()) return true;
    // Otherwise normal rule: hide once locked
    return !leaderboardLocked();
  }
  // All other teams: hide once any team hits hole 15, never show after
  return !leaderboardLocked();
}
function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ─── Drive picker ─────────────────────────────────────────────────────────────
function openDrivePicker(ti, hi) {
  return new Promise(resolve => {
    dPickerTeam=ti; dPickerHole=hi; dPickerResolve=resolve;
    const players = TEAM_PLAYERS[ti]; // already alphabetical
    const current = state.teeShots[ti][hi] || null;
    document.getElementById("drivePickerTitle").textContent = "Hole "+(hi+1)+" — Who drove?";
    document.getElementById("drivePickerSub").textContent = TEAMS[ti].name;
    buildDriveDrum(players, current);
    document.getElementById("drivePickerOverlay").classList.add("open");
    document.body.style.overflow="hidden";
  });
}
function buildDriveDrum(players, selected) {
  const drum = document.getElementById("driveDrumInner");
  drum.innerHTML="";
  const PAD2=2;
  for(let k=0;k<PAD2;k++) drum.appendChild(makePad2());
  players.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className="picker-item"; el.textContent=p; el.dataset.p=p;
    el.style.fontSize="20px";
    drum.appendChild(el);
  });
  for(let k=0;k<PAD2;k++) drum.appendChild(makePad2());
  const selIdx = selected ? players.indexOf(selected) : 0;
  drum.scrollTop = Math.max(0,selIdx) * ITEM_H;
  drum.getBoundingClientRect();
  refreshDriveDrum(drum, players);
  drum.addEventListener("scroll",()=>{
    refreshDriveDrum(drum,players);
    clearTimeout(dPickerScrollTimer);
    dPickerScrollTimer=setTimeout(()=>snapDriveDrum(drum,players),100);
  },{passive:true});
}
function makePad2(){const e=document.createElement("div");e.className="picker-item";e.style.visibility="hidden";return e;}
function snapDriveDrum(drum,players){
  const idx=Math.round(drum.scrollTop/ITEM_H);
  const c=Math.max(0,Math.min(players.length-1,idx));
  drum.scrollTo({top:c*ITEM_H,behavior:"smooth"});
  refreshDriveDrum(drum,players);
}
function getSelectedDriveIdx(drum){return Math.round(drum.scrollTop/ITEM_H);}
function refreshDriveDrum(drum,players){
  const idx=getSelectedDriveIdx(drum);
  drum.querySelectorAll(".picker-item[data-p]").forEach((el,i)=>el.classList.toggle("active",i===idx));
  if(players[idx]) document.getElementById("drivePickerFooter").textContent="Selected: "+players[idx];
}
function driveOverlayClick(e){if(e.target===document.getElementById("drivePickerOverlay"))closeDrivePicker(false);}
function closeDrivePicker(commit){
  const drum=document.getElementById("driveDrumInner");
  let chosen=null;
  if(commit){
    const idx=getSelectedDriveIdx(drum);
    const players=TEAM_PLAYERS[dPickerTeam];
    chosen=players[Math.max(0,Math.min(players.length-1,idx))];
  }
  document.getElementById("drivePickerOverlay").classList.remove("open");
  document.body.style.overflow="";
  if(dPickerResolve){ dPickerResolve(chosen); dPickerResolve=null; }
  dPickerTeam=null; dPickerHole=null;
}

// ─── Drives Firebase ──────────────────────────────────────────────────────────
function drivesDocId(ti){ return "team_"+ti; }

// Drives are computed from teeShots (stored in team doc) — no separate collection needed.

// ─── Tee shot recording ───────────────────────────────────────────────────────
// state.teeShots[ti] = array of player names indexed by hole
// We store this in the main team doc to keep things together
function getTeeShots(ti){ return state.teeShots[ti]; }

async function recordTeeShot(ti, hi){
  const player = await openDrivePicker(ti, hi);
  if(!player) return;
  state.teeShots[ti][hi] = player;
  // drives tally is always computed from teeShots, no manual counter needed
  renderScoreCard();
  // Save teeShots in team doc (scores save), and drives separately for drives tab
  clearTimeout(window._st);
  window._st = setTimeout(() => saveTeamScores(ti), 400);
  renderDrives();
  showToast(player+" recorded as driver — Hole "+(hi+1));
}

// ─── Render: drives tab ───────────────────────────────────────────────────────
function renderDrives(){
  const el=document.getElementById("drivesContent");
  if(!el) return;
  el.innerHTML=TEAMS.map((t,ti)=>{
    const players=TEAM_PLAYERS[ti];
    const tally=computeDrives(ti);
    const total=players.reduce((a,p)=>a+(tally[p]||0),0);
    const max=Math.max(1,...players.map(p=>tally[p]||0));
    const rows=players.map(p=>{
      const cnt=tally[p]||0;
      const pct=Math.round((cnt/max)*100);
      const met=cnt>=4;
      return`<div class="drives-player" style="${met?"background:#eaf7f2;border-color:#a8dece":""}">
        <div style="flex:1">
          <div class="drives-player-name" style="${met?"color:#085041;font-weight:700":""}">
            ${p}${met?" ✓":""}
          </div>
          <div class="drives-bar"><div class="drives-bar-fill" style="width:${pct}%;background:${met?"#085041":"#1a4a1a"}"></div></div>
        </div>
        <div class="drives-count" style="${met?"color:#085041":""}">${cnt}</div>
      </div>`;
    }).join("");
    return`<div class="drives-team-block">
      <div class="drives-team-title">
        <div style="width:10px;height:10px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
        ${t.name}
        <span style="font-family:'EB Garamond',serif;font-size:12px;color:#8a9a8a;font-weight:normal;margin-left:auto">${total} drives recorded</span>
      </div>
      <div class="drives-grid">${rows}</div>
    </div>`;
  }).join("");
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderTabs(){
  const canLb=canSeeLeaderboard();
  const cur=document.querySelector(".section.active");
  const curId=cur?cur.id:"entry";
  // If Miles and all submitted, show a special 'Results' label
  const lbLabel = (currentTeam===1 && allCardsSubmitted()) ? "🏆 Results" : "Leaderboard";
  document.querySelector(".tabs").innerHTML=`
    <button class="tab${curId==="entry"?" active":""}" id="tab-entry" onclick="switchTab('entry')">Scores</button>
    ${canLb?` <button class="tab${curId==="dashboard"?" active":""}" id="tab-dashboard" onclick="switchTab('dashboard')">${lbLabel}</button>`:""}
    <button class="tab${curId==="drives-tab"?" active":""}" id="tab-drives-tab" onclick="switchTab('drives-tab')">Drives</button>`;
  if(!canLb&&document.getElementById("dashboard").classList.contains("active")) switchTab("entry");
}
function switchTab(tab){
  if(tab==="dashboard"&&!canSeeLeaderboard())return;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const a=document.getElementById("tab-"+tab);if(a)a.classList.add("active");
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  if(tab==="dashboard")renderDashboard();
  if(tab==="drives-tab")renderDrives();
}

function renderScoreCard(){
  const el=document.getElementById("scoreCard");
  const ti=currentTeam;
  if(ti===null){el.innerHTML="";return;}
  const t=TEAMS[ti],sc=state.scores[ti],done=state.submitted[ti];
  const played=sc.filter(s=>s!==null);
  const totRaw=played.reduce((a,b)=>a+b,0);
  const parPlayed=PARS.filter((_,i)=>sc[i]!==null).reduce((a,b)=>a+b,0);
  const netVp=(totRaw-parPlayed)+t.handicap;
  const vpColor=netVp<0?"#0C447C":netVp>0?"#791F1F":"#1a4a1a";
  const locked=leaderboardLocked();

  function holeItem(i){
    const s=sc[i],par=PARS[i],diff=s!==null?toVsPar(s,par):null;
    const yards=YARDS[i];
    if(done){
      return`<div class="hole-row">
        <div class="hole-num">${i+1}</div>
        <div class="hole-par">Par<br>${par}</div>
        <div class="hole-yards">${yards}<br>yds</div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;color:${t.color};text-align:center">${s??'—'}</div>
        <div class="diff-pill ${diff?diff.cls:"diff-empty"}">${diff?diff.label:"—"}</div>
      </div>`;
    }
    const label=s!==null?s:`<span style="font-size:13px;font-family:'EB Garamond',serif;color:#aaa">tap</span>`;
    const driver=state.teeShots[ti][i];
    return`<div class="hole-row" style="grid-template-columns:1.8rem 2.6rem 3rem 1fr auto auto">
      <div class="hole-num">${i+1}</div>
      <div class="hole-par">Par<br>${par}</div>
      <div class="hole-yards">${yards}<br>yds</div>
      <button class="score-btn${s!==null?"":" no-score"}" onclick="openPicker(${ti},${i})"
        style="${s!==null?"border-color:"+t.color+";color:"+t.color:""}">${label}</button>
      <button class="tee-btn${driver?" has-driver":""}" onclick="recordTeeShot(${ti},${i})">
        <span class="tee-btn-label">Drive</span>${driver?driver.split(" ")[0]:"?"}</button>
      <div class="diff-pill ${diff?diff.cls:"diff-empty"}">${diff?diff.label:"—"}</div>
    </div>`;
  }

  el.innerHTML=`<div class="card">
    <div class="card-title">
      <div style="width:32px;height:32px;border-radius:50%;background:${t.light};display:flex;align-items:center;justify-content:center;
        font-family:'Playfair Display',serif;font-size:12px;color:${t.color};flex-shrink:0">${t.name.replace(/'/g,"").slice(0,2).toUpperCase()}</div>
      ${t.name}${t.handicap?` <span class="hcap-badge">+${t.handicap} handicap</span>`:""}
    </div>
    ${locked?`<div class="lock-notice">The leaderboard is now hidden — results will be revealed at the 19th hole.</div>`:""}
    <div class="nine-lbl">Front nine</div>
    <div class="hole-list">${Array.from({length:9},(_,i)=>holeItem(i)).join("")}</div>
    <div class="nine-lbl" style="margin-top:6px">Back nine</div>
    <div class="hole-list">${Array.from({length:9},(_,i)=>holeItem(i+9)).join("")}</div>
    <div class="submit-area">
      <div>
        <div class="total-lbl">Total${t.handicap?" (net)":""}</div>
        <div class="total-num">${totRaw||"—"}</div>
        ${totRaw?`<div class="total-vp" style="color:${vpColor}">${vpStr(netVp)} vs par</div>`:""}
        <div class="saving-ind" id="savingIndicator"></div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        ${done?`<span class="submitted-badge">✓ Card submitted</span>`:`
          <button class="reset-btn" onclick="resetScores(${ti})">Reset scores</button>
          <button class="submit-btn" onclick="submitScores(${ti})">Submit card</button>`}
      </div>
    </div>
  </div>`;
}

function renderDashboard(){
  const rows=TEAMS.map((t,ti)=>{
    const sc=state.scores[ti],pl=sc.filter(s=>s!==null);
    const tot=pl.reduce((a,b)=>a+b,0);
    const parP=PARS.filter((_,i)=>sc[i]!==null).reduce((a,b)=>a+b,0);
    return{...t,holes:pl.length,total:tot,vsPar:pl.length?(tot-parP)+t.handicap:null};
  }).sort((a,b)=>{
    if(!a.holes&&!b.holes)return 0;
    if(!a.holes)return 1;if(!b.holes)return -1;
    return a.vsPar-b.vsPar;
  });
  const leader=rows[0];
  const allD=TEAMS.flatMap((t,ti)=>state.scores[ti].map((s,i)=>s!==null?s-PARS[i]:null).filter(x=>x!==null));
  const totH=rows.reduce((a,b)=>a+b.holes,0);
  document.getElementById("statCards").innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Leading</div>
      <div class="stat-val" style="font-size:13px;color:${leader.color}">${leader.holes?leader.name:"TBD"}</div>
      <div class="stat-sub">${leader.holes&&leader.vsPar!==null?vpStr(leader.vsPar)+" vs par":"No scores yet"}</div></div>
    <div class="stat-card"><div class="stat-lbl">Holes played</div>
      <div class="stat-val">${totH}</div><div class="stat-sub">all teams</div></div>
    <div class="stat-card"><div class="stat-lbl">Eagles · Birdies</div>
      <div class="stat-val">${allD.filter(d=>d<=-2).length} · ${allD.filter(d=>d===-1).length}</div><div class="stat-sub">all teams</div></div>`;
  const medals=["🥇","🥈","🥉","4th","5th"];
  document.getElementById("leaderboard").innerHTML=rows.map((t,pos)=>{
    const vp=t.vsPar,sc=vp===null?"—":vpStr(vp);
    const scColor=vp===null?"#8a9a8a":vp<0?"#0C447C":vp>0?"#791F1F":"#1a4a1a";
    return`<div class="lb-row${pos===0?" leader":""}">
      <div class="lb-pos">${medals[pos]}</div>
      <div class="lb-name"><div class="lb-dot" style="background:${t.color}"></div>${t.name}</div>
      <div class="lb-holes">${t.holes}/18</div>
      <div class="lb-score" style="color:${scColor}">${sc}</div>
    </div>${pos===0?`<hr class="lb-div">`:""}`;
  }).join("");
  const hs=Array.from({length:HOLES},(_,hi)=>{
    const vals=TEAMS.map((_,ti)=>state.scores[ti][hi]).filter(s=>s!==null);
    if(!vals.length)return"empty";
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length-PARS[hi];
    return avg<-0.5?"under":avg>0.5?"over":"par";
  });
  document.getElementById("holeProgress").innerHTML=hs.map((s,i)=>{
    const bg=s==="under"?"#d8f0e8":s==="over"?"#fae0e0":s==="par"?"#daefd8":"transparent";
    const tc=s==="under"?"#085041":s==="over"?"#791F1F":s==="par"?"#27500A":"#8a9a8a";
    return`<div class="hp-dot" style="background:${bg};color:${tc};border-color:${s==="empty"?"#c8b88a":bg}">${i+1}</div>`;
  }).join("");
}

function resetScores(ti) {
  if (!confirm("Reset all scores for " + TEAMS[ti].name + "? This cannot be undone.")) return;
  state.scores[ti] = Array(HOLES).fill(null);
  state.submitted[ti] = false;
  state.teeShots[ti] = Array(HOLES).fill(null);
  renderTabs(); renderScoreCard();
  clearTimeout(window._st);
  window._st = setTimeout(() => saveTeamScores(ti), 400);
  showToast("Scores reset for " + TEAMS[ti].name);
}

async function adminResetAll() {
  if (!confirm("⚠ Reset ALL scores and drives for every team?\n\nThis will permanently clear everything and cannot be undone.")) return;
  if (!confirm("Are you absolutely sure? This clears all 5 teams completely.")) return;
  for (let ti = 0; ti < TEAMS.length; ti++) {
    state.scores[ti]    = Array(HOLES).fill(null);
    state.submitted[ti] = false;
    state.teeShots[ti]  = Array(HOLES).fill(null);
    // Clear local cache so other devices don't restore old submitted state
    clearCache(ti);
    saveToCache(ti);
    if (db && isOnline) {
      try {
        await db.collection(COLLECTION).doc("team_"+ti).set({
          teamId: ti, teamName: TEAMS[ti].name,
          scores: Array(HOLES).fill(null),
          submitted: false,
          teeShots: Array(HOLES).fill(null),
          resetAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch(e) { showToast("Reset failed for " + TEAMS[ti].name + " — check connection"); }
    }
  }
  // Force full re-render so submitted lock is immediately lifted on Miles' screen too
  renderTabs();
  renderScoreCard();
  renderDashboard();
  renderDrives();
  showToast("All scores and drives have been reset ✓");
}

async function submitScores(ti){
  state.submitted[ti]=true;
  renderTabs();
  renderScoreCard();
  await saveTeamScores(ti);
  showToast(TEAMS[ti].name+" — card submitted");
  // If all now submitted, prompt Miles to view results
  if(currentTeam===1 && allCardsSubmitted()){
    showToast("All cards in — Results now available!");
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
if (restoreSession()) {
  launchApp();
} else {
  document.getElementById("loginScreen").style.display = "flex";
  if (!navigator.onLine) {
    document.getElementById("loginOffline").textContent = "You appear to be offline. Login still works — scores will sync when reconnected.";
  }
}
</script>
</body>
</html>
